# This is a Databricks asset bundle definition for ai_parse_document_workflow.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ai_parse_document_app_workflow

variables:
  catalog:
    description: The catalog name for the workflow
    default: workspace
  schema:
    description: The schema name for the workflow
    default: ai_parse_document_demo
  clean_pipeline_tables:
    description: Clean pipeline tables and checkpoints
    default: Yes
  source_volume_path:
    description: Source volume path for PDF files
    default: /Volumes/workspace/ai_parse_document_demo/ai_parse_document_app_workflow/inputs/
  output_volume_path:
    description: Output volume path for processed images
    default: /Volumes/workspace/ai_parse_document_demo/ai_parse_document_app_workflow/outputs/
  checkpoint_base_path:
    description: Base path for Structured Streaming checkpoints
    default: /Volumes/workspace/ai_parse_document_demo/checkpoints/ai_parse_document_app_workflow/
  raw_table_name:
    description: Table name for raw parsed documents
    default: parsed_documents_raw
  content_table_name:
    description: Table name for extracted text
    default: parsed_documents_content
  agent_choice:
    description: Agent choice for extracting key information
    default: ai_query
  structured_table_name:
    description: Table name for structured data
    default: parsed_documents_structured

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
    permissions:
      - group_name: users
        level: CAN_VIEW
